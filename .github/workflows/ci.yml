name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # ── Flutter App ──────────────────────────────────────────────────
  flutter:
    name: Flutter Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.29.3"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test

      - name: Build Web
        run: flutter build web --release

  # ── Serverpod Backend ────────────────────────────────────────────
  server:
    name: Server Analyze & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_DB: tamagotchi_server_test
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: "3.7.2"

      - name: Install dependencies
        run: dart pub get

      - name: Analyze
        run: dart analyze --no-fatal-infos

      - name: Run tests
        run: dart test

  # ── Docker Build ─────────────────────────────────────────────────
  docker:
    name: Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Server Image
        run: docker build -t tamagotchi-server ./server

      - name: Build Web Image
        run: docker build -t tamagotchi-web -f Dockerfile.web .

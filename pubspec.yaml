name: tamagotchi
description: "A modern cross-platform Tamagotchi app with arena battles and tournaments"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  cached_network_image: ^3.4.1

  # State Management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Serverpod Client
  tamagotchi_server_client:
    path: client
  serverpod_client: 2.9.2

  # Local Storage
  shared_preferences: ^2.3.4
  flutter_secure_storage: ^9.2.3

  # Utils
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
